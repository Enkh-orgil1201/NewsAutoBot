name: Debug FB Token

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check page restrictions & post privacy
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          echo "=== Page details (restrictions, visibility) ==="
          curl -s "https://graph.facebook.com/v21.0/${FB_PAGE_ID}?fields=id,name,is_published,is_webhooks_subscribed,country_page_likes,fan_count,restrictions,country_restrictions,age_restrictions,is_permanently_closed,verification_status&access_token=${FB_PAGE_ACCESS_TOKEN}" | python3 -m json.tool
          echo ""
          echo "=== Latest post privacy & visibility ==="
          curl -s "https://graph.facebook.com/v21.0/${FB_PAGE_ID}/feed?fields=id,privacy,is_published,is_hidden,is_expired,status_type,created_time&limit=3&access_token=${FB_PAGE_ACCESS_TOKEN}" | python3 -m json.tool
          echo ""
          echo "=== Page tasks (admin permissions) ==="
          curl -s "https://graph.facebook.com/v21.0/me/accounts?fields=id,name,tasks&access_token=${FB_PAGE_ACCESS_TOKEN}" | python3 -m json.tool
