name: Auto Post News

on:
  schedule:
    # UTC цагаар 3 удаа / өдөр (Монголын 09:00, 15:00, 21:00)
    - cron: "0 1 * * *"
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:  # Гараар ажиллуулах товч

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_POSTS_PER_RUN: "3"
        run: python main.py

      - name: Commit posted.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json || true
          git diff --cached --quiet || git commit -m "chore: update posted.json [skip ci]"
          git push || true
